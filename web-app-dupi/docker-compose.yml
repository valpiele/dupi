services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: dupi
      POSTGRES_PASSWORD: dupi_dev
      POSTGRES_DB: dupi_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dupi -d dupi_dev"]
      interval: 3s
      timeout: 5s
      retries: 10

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    ports:
      - "10000:10000"
    volumes:
      - azurite_data:/data
    command: azurite-blob --blobHost 0.0.0.0 --loose

volumes:
  postgres_data:
  azurite_data:
