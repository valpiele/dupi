services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: planner
      POSTGRES_PASSWORD: planner_dev
      POSTGRES_DB: planner_dev
    ports:
      - "5433:5432"
    volumes:
      - planner_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U planner -d planner_dev"]
      interval: 3s
      timeout: 5s
      retries: 10

volumes:
  planner_pg_data:
